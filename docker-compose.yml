services:
  signaling-server:
    build:
      context: .
      dockerfile: Dockerfile.signaling
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - LISTEN_ADDR=0.0.0.0:8080
      - RUST_LOG=info
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
