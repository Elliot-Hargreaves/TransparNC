# Docker Compose topology for ICE integration tests.
#
# Topology:
#   private-net-1          public-net           private-net-2
#   [peer-1] <-> [nat-router-1] <-> [stun + signaling] <-> [nat-router-2] <-> [peer-2]
#
# NAT routers use iptables MASQUERADE to simulate home routers.
# Peers can only reach the public network through their respective NAT gateway.

services:
  # --- Public network services ---

  stun-server:
    image: coturn/coturn
    container_name: ice-stun
    command:
      - "-n"
      - "--no-auth"
      - "--no-tls"
      - "--no-dtls"
      - "--listening-ip=0.0.0.0"
      - "--external-ip=172.50.0.100"
      - "--log-file=stdout"
      - "-v"
    networks:
      public_net:
        ipv4_address: 172.50.0.100

  redis:
    image: redis:7-alpine
    container_name: ice-redis
    command: redis-server --appendonly no
    networks:
      public_net:
        ipv4_address: 172.50.0.102

  signaling-server:
    container_name: ice-signaling
    build:
      context: .
      dockerfile: Dockerfile.signaling
    environment:
      - REDIS_URL=redis://172.50.0.102:6379
      - LISTEN_ADDR=0.0.0.0:8080
    depends_on:
      - redis
    networks:
      public_net:
        ipv4_address: 172.50.0.101

  # --- NAT Router 1 (bridges private-net-1 <-> public-net) ---

  nat-router-1:
    container_name: ice-nat-router-1
    image: alpine
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      public_net:
        ipv4_address: 172.50.0.10
      private_net_1:
        ipv4_address: 172.60.0.2
    tty: true
    command: >
      sh -c "
      apk add --no-cache iptables iproute2 &&
      PUBLIC_IF=$$(ip -o -4 addr show | awk '/172\.50/{print $$2}' | head -1) &&
      PRIVATE_IF=$$(ip -o -4 addr show | awk '/172\.60/{print $$2}' | head -1) &&
      echo NAT-1 public=$$PUBLIC_IF private=$$PRIVATE_IF &&
      iptables -t nat -A POSTROUTING -o $$PUBLIC_IF -j MASQUERADE &&
      iptables -t nat -A PREROUTING -i $$PUBLIC_IF -p udp --dport 51820:51849 -j DNAT --to-destination 172.60.0.10 &&
      iptables -A FORWARD -i $$PUBLIC_IF -o $$PRIVATE_IF -p udp -j ACCEPT &&
      iptables -A FORWARD -i $$PRIVATE_IF -o $$PUBLIC_IF -j ACCEPT &&
      echo NAT-1 ready &&
      sleep 3600
      "
    depends_on:
      - stun-server
      - signaling-server

  # --- NAT Router 2 (bridges private-net-2 <-> public-net) ---

  nat-router-2:
    container_name: ice-nat-router-2
    image: alpine
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      public_net:
        ipv4_address: 172.50.0.20
      private_net_2:
        ipv4_address: 172.70.0.2
    tty: true
    command: >
      sh -c "
      apk add --no-cache iptables iproute2 &&
      PUBLIC_IF=$$(ip -o -4 addr show | awk '/172\.50/{print $$2}' | head -1) &&
      PRIVATE_IF=$$(ip -o -4 addr show | awk '/172\.70/{print $$2}' | head -1) &&
      echo NAT-2 public=$$PUBLIC_IF private=$$PRIVATE_IF &&
      iptables -t nat -A POSTROUTING -o $$PUBLIC_IF -j MASQUERADE &&
      iptables -t nat -A PREROUTING -i $$PUBLIC_IF -p udp --dport 51820:51849 -j DNAT --to-destination 172.70.0.10 &&
      iptables -A FORWARD -i $$PUBLIC_IF -o $$PRIVATE_IF -p udp -j ACCEPT &&
      iptables -A FORWARD -i $$PRIVATE_IF -o $$PUBLIC_IF -j ACCEPT &&
      echo NAT-2 ready &&
      sleep 3600
      "
    depends_on:
      - stun-server
      - signaling-server

  # --- Peer 1 (behind NAT router 1) ---

  peer-1:
    container_name: ice-peer-1
    build: .
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      private_net_1:
        ipv4_address: 172.60.0.10
    tty: true
    entrypoint: /bin/sh
    command: >
      -c "
      ip route del default || true &&
      ip route add default via 172.60.0.2 &&
      echo 'Peer-1 routing configured, waiting for NAT routers...' &&
      sleep 10 &&
      echo 'Peer-1 ready' &&
      sleep 3600
      "
    depends_on:
      - nat-router-1

  # --- Peer 2 (behind NAT router 2) ---

  peer-2:
    container_name: ice-peer-2
    build: .
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      private_net_2:
        ipv4_address: 172.70.0.10
    tty: true
    entrypoint: /bin/sh
    command: >
      -c "
      ip route del default || true &&
      ip route add default via 172.70.0.2 &&
      echo 'Peer-2 routing configured, waiting for NAT routers...' &&
      sleep 10 &&
      echo 'Peer-2 ready' &&
      sleep 3600
      "
    depends_on:
      - nat-router-2

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.50.0.0/16
  private_net_1:
    driver: bridge
    ipam:
      config:
        - subnet: 172.60.0.0/16
  private_net_2:
    driver: bridge
    ipam:
      config:
        - subnet: 172.70.0.0/16
