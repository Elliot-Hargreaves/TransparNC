services:
  stun-server:
    image: coturn/coturn
    command: ["-n", "--no-auth", "--no-tls", "--no-dtls", "--listening-ip", "0.0.0.0", "--external-ip", "172.30.0.100", "--log-file", "stdout", "-v"]
    networks:
      public_net:
        ipv4_address: 172.30.0.100

  nat-gateway:
    container_name: nat-gateway
    image: alpine
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      public_net:
        ipv4_address: 172.30.0.2
      private_net:
        ipv4_address: 172.40.0.2
    tty: true
    command: >
      sh -c "
      apk add --no-cache iptables &&
      PUBLIC_IF=$$(ip -4 addr show | grep 172.30 | awk '{print $$NF}') &&
      echo \"NAT gateway public interface: $$PUBLIC_IF\" &&
      iptables -t nat -A POSTROUTING -o $$PUBLIC_IF -j MASQUERADE &&
      sleep 3600
      "
    depends_on:
      - stun-server

  peer-behind-nat:
    container_name: peer-behind-nat
    build: .
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      private_net:
        ipv4_address: 172.40.0.4
    tty: true
    entrypoint: /bin/sh
    command: >
      -c "
      ip route del default || true &&
      ip route add default via 172.40.0.2 &&
      sleep 10 &&
      /usr/local/bin/transpar_nc --local-port 51820 --tun-ip 10.0.0.1 --stun-server 172.30.0.100:3478
      "
    depends_on:
      - nat-gateway

  peer-public:
    container_name: peer-public
    build: .
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      public_net:
        ipv4_address: 172.30.0.3
    tty: true
    command: /usr/local/bin/transpar_nc --local-port 51820 --tun-ip 10.0.0.2 --stun-server 172.30.0.100:3478
    depends_on:
      - stun-server

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
  private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.40.0.0/16
